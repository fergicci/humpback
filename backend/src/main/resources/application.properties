spring.application.name=backend

# Server Settings
server.error.include-stacktrace=never

# API Settings
spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.ignore-accept-header=false
spring.mvc.contentnegotiation.default-content-type=application/json

# API Responses
spring.jackson.default-property-inclusion=non_null

# MongoDB settings
spring.data.mongodb.host=mongo
spring.data.mongodb.port=27017
spring.data.mongodb.database=humpbackdb

# Security
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}
jwt.forgot-password-challenge-expiration-ms=${JWT_FORGOT_PASSWORD_CHALLENGE_EXPIRATION_MS:300000}
security.2fa.encryption-key-base64=${TWO_FACTOR_ENCRYPTION_KEY_BASE64:}
security.user-accounts.password-change-threshold-days=${PASSWORD_CHANGE_THRESHOLD_DAYS:5}

# Sysadmin settings
sysadmin.username=${SYSADMIN_USERNAME}
sysadmin.fullname=${SYSADMIN_FULLNAME}
sysadmin.email=${SYSADMIN_EMAIL}
sysadmin.password=${SYSADMIN_PASSWORD}

# Dashboard scheduler
dashboard.scheduler.cron=${DASHBOARD_SCHEDULER_CRON:0 */5 * * * *}
